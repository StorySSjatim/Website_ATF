<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Detail Produk | CameraStory</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-cream: #F4EFE6; --bg-dark: #1B2A22; --gold: #C5A059; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-cream); color: #333; margin: 0; }
        
        /* Navigasi */
        nav { background: var(--bg-dark); padding: 1.5rem 5%; }
        .back-btn { color: var(--gold); text-decoration: none; font-weight: 500; font-size: 1rem; }
        
        /* Layout */
        .product-page { max-width: 1000px; margin: 3rem auto; display: flex; gap: 3rem; flex-wrap: wrap; padding: 0 5%; }
        .image-side { flex: 1; min-width: 300px; }
        #main-img { width: 100%; border-radius: 8px; border: 4px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .thumbnail-container { display: flex; gap: 10px; margin-top: 15px; }
        .thumb { width: 48%; height: 120px; object-fit: cover; border-radius: 5px; border: 2px solid #ddd; }

        .info-side { flex: 1; min-width: 300px; }
        h1 { font-family: 'Playfair Display', serif; color: var(--bg-dark); font-size: 2.5rem; margin-bottom: 0.5rem; }
        .price-tag { font-size: 1.8rem; color: var(--gold); font-weight: bold; margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; }
        .btn-checkout { background: var(--bg-dark); color: var(--gold); width: 100%; padding: 1.2rem; border: none; border-radius: 5px; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-checkout:hover { background: var(--gold); color: var(--bg-dark); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="back-btn">&larr; Kembali ke Katalog</a>
    </nav>

    <div class="product-page">
        <div class="image-side">
            <img id="main-img" src="images/helios.jpg" alt="Main Product">
            <div class="thumbnail-container">
                <img id="thumb1" class="thumb" src="images/kodak.jpg" alt="Film">
                <img id="thumb2" class="thumb" src="images/fuji.jpg" alt="Bundle">
            </div>
        </div>

        <div class="info-side">
            <h1>Zenit-E Classic</h1>
            <div class="price-tag" id="display-price">Rp 2.150.000</div>

            <div class="input-group">
                <label>Pilihan Lensa:</label>
                <select id="lens-select" onchange="updateVisual()">
                    <option value="0" data-img="body_only.jpg">Body Only - Rp 0</option>
                    <option value="450000" data-img="helios.jpg" selected>Helios 44-2 (+ 450rb)</option>
                    <option value="1200000" data-img="zeiss.jpg">Carl Zeiss (+ 1.2jt)</option>
                </select>
            </div>

            <div class="input-group">
                <label>Roll Film:</label>
                <select id="film-select" onchange="updateVisual()">
                    <option value="0" data-img="kodak.jpg">Tanpa Roll Film</option>
                    <option value="175000" data-img="kodak.jpg">Kodak ColorPlus (+ 175rb)</option>
                    <option value="210000" data-img="fuji.jpg">Fujifilm C200 (+ 210rb)</option>
                </select>
            </div>

            <div class="input-group">
                <label>Paket Starter Kit:</label>
                <select id="bundle-select" onchange="updateVisual()">
                    <option value="0" data-img="fuji.jpg">Tanpa Bundle</option>
                    <option value="250000" data-img="body_only.jpg">Starter Kit (+ 250rb)</option>
                </select>
            </div>

            <button class="btn-checkout" onclick="checkoutNow()">Beli Sekarang</button>
        </div>
    </div>

    <script>
        const basePrice = 1700000;

        function updateVisual() {
            let lens = document.getElementById('lens-select');
            let film = document.getElementById('film-select');
            let bundle = document.getElementById('bundle-select');
            
            // Update Gambar
            document.getElementById('main-img').src = "images/" + lens.options[lens.selectedIndex].getAttribute('data-img');
            document.getElementById('thumb1').src = "images/" + film.options[film.selectedIndex].getAttribute('data-img');
            document.getElementById('thumb2').src = "images/" + bundle.options[bundle.selectedIndex].getAttribute('data-img');
            
            // Hitung Harga
            let total = basePrice + parseInt(lens.value) + parseInt(film.value) + parseInt(bundle.value);
            document.getElementById('display-price').innerText = 'Rp ' + total.toLocaleString('id-ID');
        }

        function checkoutNow() {
            let total = document.getElementById('display-price').innerText.replace(/[^0-9]/g, '');
            window.location.href = "checkout.html?total=" + total;
        }
    </script>
</body>
</html>
