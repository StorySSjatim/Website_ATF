<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medium Format | CameraStory</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-cream: #F4EFE6; --bg-dark: #1B2A22; --gold: #C5A059; --text-dark: #121212; --white: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-cream); color: var(--text-dark); line-height: 1.6; }
        
        nav { background: var(--bg-dark); padding: 1.5rem 5%; display: flex; align-items: center; }
        .back-btn { color: var(--gold); text-decoration: none; font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; }
        
        .katalog { padding: 4rem 5%; }
        h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--bg-dark); margin-bottom: 3rem; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 3rem; }
        .card { background: var(--white); padding: 1.5rem; border-top: 4px solid var(--bg-dark); box-shadow: 0 10px 30px rgba(0,0,0,0.04); transition: transform 0.4s; cursor: pointer; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 280px; object-fit: cover; margin-bottom: 1.5rem; }
        .card h3 { font-size: 1.4rem; color: var(--bg-dark); margin-bottom: 0.5rem; }
        .price { font-weight: 500; color: var(--gold); font-size: 1.2rem; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="back-btn">&larr; Kembali ke Beranda</a>
    </nav>

    <section class="katalog">
        <h2>Koleksi Medium Format</h2>
        <div class="grid">
            <!-- Produk 1 -->
            <div class="card" onclick="location.href='camerastory.html'">
                <img src="images/slide3.jpg" alt="Voigtländer Bessa">
                <h3>Voigtländer Bessa</h3>
                <span class="price">Rp 5.200.000</span>
            </div>
            
            <!-- Produk 2 -->
            <div class="card" onclick="location.href='camerastory.html'">
                <img src="images/katalog1.jpg" alt="Ricohmatic">
                <h3>Ricohmatic 225 TLR</h3>
                <span class="price">Rp 4.500.000</span>
            </div>
        </div>
    </section>

</body>
</html>
